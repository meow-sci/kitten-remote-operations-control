openapi: 3.1.0
info:
  title: KROC — Kitten Remote Operations Control
  description: HTTP API for reading vehicle telemetry and sending commands to Kitten Space Agency.
  version: 0.1.0

servers:
  - url: http://localhost:7887
    description: Local KSA mod server

paths:
  /vehicle/data/list:
    get:
      summary: List all vehicles
      description: Returns a JSON array of all vehicles present in the current game system.
      operationId: listVehicles
      responses:
        '200':
          description: Successfully retrieved vehicle list (empty array is valid).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vehicle/data/current:
    get:
      summary: Get currently controlled vehicle
      description: Returns the vehicle the player currently controls, or null if no vehicle is controlled.
      operationId: getCurrentVehicle
      responses:
        '200':
          description: Successfully retrieved current vehicle (data may be null).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentVehicleResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vehicle/actions/ignite:
    post:
      summary: Ignite vehicle engine
      description: Sends a main-engine ignite command to the specified vehicle.
      operationId: igniteEngine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleActionRequest'
      responses:
        '200':
          description: Engine ignition command sent successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleActionIgniteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vehicle/actions/shutdown:
    post:
      summary: Shutdown vehicle engine
      description: Sends a main-engine shutdown command to the specified vehicle.
      operationId: shutdownEngine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleActionRequest'
      responses:
        '200':
          description: Engine shutdown command sent successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleActionShutdownResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vehicle/actions/refill:
    post:
      summary: Refill vehicle consumables
      description: Refills all consumables (fuel, etc.) on the specified vehicle by calling its RefillConsumables() method.
      operationId: refillVehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleActionRequest'
      responses:
        '200':
          description: Refill command sent successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleActionRefillResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vehicle/telemetry:
    get:
      summary: Get full kinematic telemetry of the controlled vehicle
      description: |
        Returns a complete kinematic snapshot of the currently controlled vehicle:
        position and velocity in ecliptic frame, body-frame acceleration vector
        and its scalar magnitude, total/inert/propellant masses, and the current
        simulation time in seconds.

        Use this endpoint in the brachistochrone transfer planner. Poll it at a
        fixed interval (e.g. every 3 s) and combine with `/bodies/predict/{id}`
        to continuously recompute the burn heading and flip countdown.

        Note: `accelerationMps2` reflects actual measured acceleration. It will
        read ~0 while engines are cut for a refill; use a fixed planning value
        from your ship spec in that case.
      operationId: getVehicleTelemetry
      responses:
        '200':
          description: Telemetry snapshot retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleTelemetryResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /flight-computer/state:
    get:
      summary: Get flight computer state
      description: |
        Returns the current flight computer state for the controlled vehicle:
        attitude mode, tracking target, reference frame, custom euler angles,
        attitude error angles, deadband, and rate limit.
      operationId: getFlightComputerState
      responses:
        '200':
          description: Flight computer state retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightComputerStateResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /flight-computer/attitude:
    post:
      summary: Set custom attitude hold
      description: |
        Sets the flight computer to hold a custom attitude specified as euler
        angles (roll, yaw, pitch) in a chosen reference frame. Automatically
        switches to Auto mode with Custom tracking target.

        For the EclBody (ecliptic-inertial) frame, yaw = ecliptic longitude
        and pitch = ecliptic latitude. Euler order is Roll-Yaw-Pitch for all
        frames except EnuBody which uses Roll-Pitch-Yaw.

        This is the primary endpoint for external guidance — push a computed
        heading each cycle and the flight computer will hold it.
      operationId: setAttitude
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAttitudeRequest'
      responses:
        '200':
          description: Attitude set successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetAttitudeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /flight-computer/track:
    post:
      summary: Set named tracking target
      description: |
        Sets the flight computer to track a named direction (e.g. Prograde,
        Retrograde, Normal). Switches to Auto mode and updates the navball
        to the appropriate reference frame.
      operationId: setTrackTarget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetTrackTargetRequest'
      responses:
        '200':
          description: Tracking target set successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetTrackTargetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bodies/list:
    get:
      summary: List all celestial bodies
      description: Returns all celestial bodies (planets, moons, stars) in the current system. Vehicles are excluded.
      operationId: listBodies
      responses:
        '200':
          description: Body list retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BodiesListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bodies/state/{id}:
    get:
      summary: Get current state of a celestial body
      description: Returns the current ecliptic-frame position and velocity of the named body.
      operationId: getBodyState
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: mars
      responses:
        '200':
          description: Body state retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BodyStateResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bodies/predict/{id}:
    get:
      summary: Predict future state of a celestial body
      description: |
        Returns the analytically-computed ecliptic-frame position and velocity
        of the body at a specific simulation time using KSA's Keplerian
        propagator — no linear approximation, exact for any time offset.

        This is the key endpoint for the brachistochrone intercept iteration:
        pass your estimated arrival `simTimeSec`, receive Mars's exact position
        at that moment, recompute trip time, repeat until converged.
      operationId: predictBodyState
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: mars
        - name: simTimeSec
          in: query
          required: true
          description: Target simulation time in seconds (from Universe epoch).
          schema:
            type: number
            format: double
          example: 9720000
      responses:
        '200':
          description: Predicted body state retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BodyPredictResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    VehicleListItem:
      type: object
      required: [id, name, isControlled]
      properties:
        id:
          type: string
          description: Unique vehicle identifier.
          example: vehicle-123
        name:
          type: string
          description: Display name of the vehicle (currently same as id).
          example: vehicle-123
        isControlled:
          type: boolean
          description: True if this vehicle is currently being controlled by the player.
          example: true

    CurrentVehicleData:
      type: object
      required: [id, name, hasControl]
      properties:
        id:
          type: string
          example: vehicle-123
        name:
          type: string
          example: vehicle-123
        hasControl:
          type: boolean
          example: true

    VehicleActionRequest:
      type: object
      required: [vehicleId]
      properties:
        vehicleId:
          type: string
          description: The ID of the vehicle to send the command to.
          example: vehicle-123

    VehicleActionResult:
      type: object
      required: [vehicleId, status]
      properties:
        vehicleId:
          type: string
          example: vehicle-123
        status:
          type: string
          description: The action that was performed.
          example: ignited

    VehicleListResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [ok]
        data:
          type: array
          items:
            $ref: '#/components/schemas/VehicleListItem'

    CurrentVehicleResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [ok]
        data:
          oneOf:
            - $ref: '#/components/schemas/CurrentVehicleData'
            - type: 'null'

    VehicleActionIgniteResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [ok]
        data:
          allOf:
            - $ref: '#/components/schemas/VehicleActionResult'
            - properties:
                status:
                  type: string
                  enum: [ignited]

    VehicleActionShutdownResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [ok]
        data:
          allOf:
            - $ref: '#/components/schemas/VehicleActionResult'
            - properties:
                status:
                  type: string
                  enum: [shutdown]

    VehicleActionRefillResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [ok]
        data:
          allOf:
            - $ref: '#/components/schemas/VehicleActionResult'
            - properties:
                status:
                  type: string
                  enum: [refilled]

    Vec3:
      type: object
      description: A 3-component vector in ecliptic frame (metres or m/s).
      required: [x, y, z]
      properties:
        x: { type: number, format: double }
        y: { type: number, format: double }
        z: { type: number, format: double }

    VehicleTelemetryData:
      type: object
      required: [simTimeSec, positionEcl, velocityEcl, accelerationBody, accelerationMps2, totalMassKg, inertMassKg, propellantMassKg]
      properties:
        simTimeSec:
          type: number
          format: double
          description: Current simulation time in seconds since the universe epoch.
        positionEcl:
          $ref: '#/components/schemas/Vec3'
          description: Ecliptic-frame position in metres.
        velocityEcl:
          $ref: '#/components/schemas/Vec3'
          description: Ecliptic-frame velocity in m/s.
        accelerationBody:
          $ref: '#/components/schemas/Vec3'
          description: Body-frame acceleration vector in m/s² (measured; ~0 when engines are cut).
        accelerationMps2:
          type: number
          format: double
          description: Scalar magnitude of accelerationBody in m/s².
        totalMassKg:
          type: number
          format: double
          description: Total wet mass in kg.
        inertMassKg:
          type: number
          format: double
          description: Dry/structural mass in kg.
        propellantMassKg:
          type: number
          format: double
          description: Current propellant mass in kg.
        twrCurrent:
          type: number
          format: double
          description: Current thrust-to-weight ratio (throttle-scaled; 0 when engines are off).
        twrMax:
          type: number
          format: double
          description: Maximum TWR at current mass and full throttle (vacuum, standard surface gravity).
        maxAccelMps2:
          type: number
          format: double
          description: |
            Maximum acceleration in m/s² = twrMax × parent-body surface g.
            Use this as the planning acceleration for brachistochrone calculations.
            Valid even when engines are cut (it reflects ship capability, not current thrust).

    VehicleTelemetryResponse:
      type: object
      required: [status, data]
      properties:
        status: { type: string, enum: [ok] }
        data:
          $ref: '#/components/schemas/VehicleTelemetryData'

    BodiesListItem:
      type: object
      required: [id, class, meanRadiusM]
      properties:
        id: { type: string, example: mars }
        class: { type: string, example: Planet }
        meanRadiusM:
          type: number
          format: double
          description: Mean radius of the body in metres.

    BodiesListResponse:
      type: object
      required: [status, data]
      properties:
        status: { type: string, enum: [ok] }
        data:
          type: array
          items:
            $ref: '#/components/schemas/BodiesListItem'

    BodyStateData:
      type: object
      required: [id, class, positionEcl, velocityEcl]
      properties:
        id: { type: string, example: mars }
        class: { type: string, example: Planet }
        positionEcl:
          $ref: '#/components/schemas/Vec3'
        velocityEcl:
          $ref: '#/components/schemas/Vec3'

    BodyStateResponse:
      type: object
      required: [status, data]
      properties:
        status: { type: string, enum: [ok] }
        data:
          $ref: '#/components/schemas/BodyStateData'

    BodyPredictData:
      type: object
      required: [id, atSimTimeSec, positionEcl, velocityEcl]
      properties:
        id: { type: string, example: mars }
        atSimTimeSec:
          type: number
          format: double
          description: The simulation time at which the prediction was computed.
        positionEcl:
          $ref: '#/components/schemas/Vec3'
        velocityEcl:
          $ref: '#/components/schemas/Vec3'

    BodyPredictResponse:
      type: object
      required: [status, data]
      properties:
        status: { type: string, enum: [ok] }
        data:
          $ref: '#/components/schemas/BodyPredictData'

    ErrorResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [error]
        message:
          type: string
          example: An error occurred.

    FlightComputerStateData:
      type: object
      required: [attitudeMode, trackTarget, frame, rollMode, burnMode, profile,
                 customRollRad, customYawRad, customPitchRad,
                 errorRollDeg, errorYawDeg, errorPitchDeg,
                 angleDeadbandDeg, rateLimitDegPerSec]
      properties:
        attitudeMode:
          type: string
          enum: [Manual, Auto]
          description: Current attitude control mode.
        trackTarget:
          type: string
          description: Current tracking target (None, Custom, Prograde, etc.).
        frame:
          type: string
          description: Current reference frame (EclBody, EnuBody, Lvlh, VlfBody, BurnBody, Dock).
        rollMode:
          type: string
          enum: [Decoupled, Up, Down]
        burnMode:
          type: string
          enum: [Manual, Auto]
        profile:
          type: string
          description: Matched attitude profile (Strict, Balanced, Relaxed, or Custom).
        customRollRad:
          type: number
          format: double
          description: Custom euler roll angle in radians.
        customYawRad:
          type: number
          format: double
          description: Custom euler yaw angle in radians.
        customPitchRad:
          type: number
          format: double
          description: Custom euler pitch angle in radians.
        errorRollDeg:
          type: number
          format: double
          description: Current attitude error on roll axis in degrees.
        errorYawDeg:
          type: number
          format: double
          description: Current attitude error on yaw axis in degrees.
        errorPitchDeg:
          type: number
          format: double
          description: Current attitude error on pitch axis in degrees.
        angleDeadbandDeg:
          type: number
          format: double
          description: Attitude deadband in degrees.
        rateLimitDegPerSec:
          type: number
          format: double
          description: Rate limit in degrees per second.

    FlightComputerStateResponse:
      type: object
      required: [status, data]
      properties:
        status: { type: string, enum: [ok] }
        data:
          $ref: '#/components/schemas/FlightComputerStateData'

    SetAttitudeRequest:
      type: object
      required: [roll, yaw, pitch]
      properties:
        roll:
          type: number
          format: double
          description: Euler roll in radians.
          example: 0
        yaw:
          type: number
          format: double
          description: Euler yaw in radians (ecliptic longitude for EclBody frame).
          example: 1.234
        pitch:
          type: number
          format: double
          description: Euler pitch in radians (ecliptic latitude for EclBody frame).
          example: 0.05
        frame:
          type: string
          description: "Reference frame. Default: EclBody. Valid: EclBody, EnuBody, Lvlh, VlfBody, BurnBody, Dock."
          example: EclBody

    SetAttitudeResponse:
      type: object
      required: [status, data]
      properties:
        status: { type: string, enum: [ok] }
        data:
          type: object
          required: [mode, frame, rollRad, yawRad, pitchRad]
          properties:
            mode: { type: string, example: Custom }
            frame: { type: string, example: EclBody }
            rollRad: { type: number, format: double }
            yawRad: { type: number, format: double }
            pitchRad: { type: number, format: double }

    SetTrackTargetRequest:
      type: object
      required: [target]
      properties:
        target:
          type: string
          description: "Named tracking target. Valid: None, Custom, Forward, Backward, Up, Down, Ahead, Behind, RadialOut, RadialIn, Prograde, Retrograde, Normal, AntiNormal, Outward, Inward, PositiveDv, NegativeDv, Toward, Away, Antivel, Align."
          example: Prograde

    SetTrackTargetResponse:
      type: object
      required: [status, data]
      properties:
        status: { type: string, enum: [ok] }
        data:
          type: object
          required: [target]
          properties:
            target: { type: string, example: Prograde }

  responses:
    BadRequest:
      description: Missing or invalid request parameter.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            message: Missing or invalid vehicleId.

    NotFound:
      description: The specified vehicle was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            message: Vehicle not found.

    InternalServerError:
      description: An unexpected server-side error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            message: Unexpected error.
